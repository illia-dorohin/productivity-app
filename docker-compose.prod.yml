services:
  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
