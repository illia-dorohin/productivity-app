services:
  backend:
    image: ${DOCKERHUB_USERNAME}/productivity-backend:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  frontend:
    image: ${DOCKERHUB_USERNAME}/productivity-frontend:latest
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
