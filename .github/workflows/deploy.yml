name: Build & Deploy

on:
  push:
    branches: [prod]

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/productivity-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/productivity-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image_env: BACKEND_IMAGE
          - service: frontend
            context: ./frontend
            image_env: FRONTEND_IMAGE
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/productivity-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/productivity-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/productivity-${{ matrix.service }}:latest
          cache-to: type=inline

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ~/productivity-app

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DOCKERHUB_USERNAME
          script: |
            cd ~/productivity-app
            export DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
