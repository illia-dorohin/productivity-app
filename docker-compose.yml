services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      target: dev
    command: npm run start:dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - backend-modules:/app/node_modules
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/productivity
      - FRONTEND_URL=http://localhost:4300
      - PORT=3000
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npx ng serve --host 0.0.0.0 --port 4300
    ports:
      - "4300:4300"
    volumes:
      - ./frontend/src:/app/src
      - frontend-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  mongo-data:
  backend-modules:
  frontend-modules:
